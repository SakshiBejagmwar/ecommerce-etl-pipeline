version: 2

models:

  - name: daily_sales

    columns:

      - name: order_date
        tests:
          - unique
          - not_null

  - name: monthly_sales

    columns:

      - name: year
        tests:
          - not_null

      - name: month
        tests:
          - not_null

      - name: monthly_revenue
        tests:
          - not_null

  - name: yearly_sales

    columns:

      - name: year
        tests:
          - unique
          - not_null

      - name: yearly_revenue
        tests:
          - not_null