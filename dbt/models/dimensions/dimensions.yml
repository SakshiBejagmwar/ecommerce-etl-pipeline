version: 2

models:

  - name: dim_customer
    description: Customer Dimension Table

    columns:

      - name: customer_sk
        description: Surrogate Key
        data_tests:
          - unique
          - not_null

      - name: customer_id
        description: Business Key
        data_tests:
          - unique
          - not_null

      - name: customer_unique_id
        data_tests:
          - not_null

      - name: customer_city
        data_tests:
          - not_null

      - name: customer_state
        data_tests:
          - not_null

      - name: is_current
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

  - name: dim_product
    description: Product Dimension Table

    columns:

      - name: product_sk
        data_tests:
          - unique
          - not_null

      - name: product_id
        data_tests:
          - unique
          - not_null

      - name: product_category_name
        data_tests:
          - not_null

      - name: product_weight_g
        data_tests:
          - not_null

  - name: dim_seller
    description: Seller Dimension Table

    columns:

      - name: seller_sk
        data_tests:
          - unique
          - not_null

      - name: seller_id
        data_tests:
          - unique
          - not_null

      - name: seller_city
        data_tests:
          - not_null

      - name: seller_state
        data_tests:
          - not_null

  - name: dim_date
    description: Date Dimension Table

    columns:

      - name: order_date
        data_tests:
          - unique
          - not_null

      - name: year
        data_tests:
          - not_null

      - name: month
        data_tests:
          - not_null

      - name: day
        data_tests:
          - not_null

      - name: quarter
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 1
                  - 2
                  - 3
                  - 4